name: "Terraform CI/CD Pipeline"

# パイプラインの実行条件
on:
  push:
    branches:
      - main  # mainブランチにコードにpushする時prod directoryがpushされる
      - develop # developブランチにpushする時dev directoryがpushされる
  pull_request:
    # PR(Pull Request)をした時planのために実行
    branches:
      - main  
      - develop

# [重要] OIDC 認証のためGitHubにトーコン発給権限を許容します。 
permissions:
  id-token: write   # AWSとOIDC通信のてめ必須権限
  contents: read    # Gitリポジトリのコードを読むための権限

jobs:
  terraform:
    name: "Terraform Deploy & DX Error Handling"
    runs-on: ubuntu-latest

    # 環境によって Dynamic directory allocation
    env:
      TF_WORKING_DIR: ${{ (github.base_ref == 'main' || github.ref_name == 'main') && './env/prod' || './env/dev'}}

    # 作業デイレクトの指定
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      # 1. コードの取得
      - name: Checkout Code
        uses: actions/checkout@v6

      ## 現在の ENV　確認
      - name: Environment Check
        run: |
          echo "Trigger Event: ${{ github.event_name }}"
          echo "Target Branch: ${{ github.ref_name }}"
          echo "Selected Directory: ${{ env.TF_WORKING_DIR }}"
          echo "### Deploying to: ${{ env.TF_WORKING_DIR }}" >> $GITHUB_STEP_SUMMARY  

      # 2. AWS OIDC認証
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      # 3. Terraform　のインストール
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3 

      # 4. Terraform 初期化
      - name: Terraform Init
        id: init
        run: terraform init 
  
      # 6-1構文とロジック検証
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
      # validation error 処理
      - name: Validate Error Report 
        if: failure() && steps.validate.outcome == 'failure'
        run: |
          echo "::error title=Validation Error::変数の未定義や構文エラーなどの論理的な欠陥があります。"
          echo "### 🚨 Terraform Validate 失敗 " >> $GITHUB_STEP_SUMMARY
          echo "記述された \`.tf\` ファイル内に致命的な構文エラー（Syntax Error）が含まれています。" >> $GITHUB_STEP_SUMMARY
          echo "- **主な原因:** 存在しない変数の参照、タイポ、必須パラメータの欠落など。" >> $GITHUB_STEP_SUMMARY
          echo "- **解決策:** ターミナルのログ（Raw Log）を確認し、該当行のコードを修正してください。" >> $GITHUB_STEP_SUMMARY

      # 7-1 インフラ変更の計画作成
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color
      #　プランエラー処理
      - name: Plan Error Report
        if: failure() && steps.plan.outcome == 'failure'
        run: |
          echo "::error title=Plan Error::AWS APIとの通信エラー、または権限不足が発生しました。"
          echo "### 🚨 Terraform Plan 失敗 " >> $GITHUB_STEP_SUMMARY
          echo "AWS環境のリソース状態を読み取る際、または変更を計画する際にエラーが発生しました。" >> $GITHUB_STEP_SUMMARY
          echo "- **主な原因:** IAM権限（Role）の不足、または既存のAWSリソースとの深刻な競合。" >> $GITHUB_STEP_SUMMARY
          echo "- **解決策:** AWSの認証情報（OIDC）とTerraformの状態ファイル（tfstate）を確認してください。" >> $GITHUB_STEP_SUMMARY
      
      # For debug
      - name: Who am I? (AWSアカウント確認)
        run: aws sts get-caller-identity

      # 8-1　本番環境への適用
      - name: Terraform Apply
        id: apply
        if: github.event_name == 'push'
        run: terraform apply -auto-approve
      
      - name: Apply Error Report
        if: failure() && steps.apply.outcome == 'failure'
        run: |
          echo "::error title=Apply Error::インフラの構築中に致命的な障害が発生しました。即時対応が必要です。"
          echo "### 💥 Terraform Apply 失敗 " >> $GITHUB_STEP_SUMMARY
          echo "インフラのプロビジョニング中にAWS側でエラーが発生し、デプロイが中断されました。" >> $GITHUB_STEP_SUMMARY
          echo "- **影響:** システムが不完全な状態（Partial State）になっている可能性があります。" >> $GITHUB_STEP_SUMMARY
          echo "- **緊急措置:** AWSマネジメントコンソール及びログを直ちに確認し、手動でのロールバックまたは修正を行ってください。" >> $GITHUB_STEP_SUMMARY